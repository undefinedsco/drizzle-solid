name: Sync Documentation to Context7

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'examples/**'
      - 'README.md'
  workflow_dispatch:

jobs:
  sync-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Upsert to Context7
        uses: rennf93/upsert-context7@v1
        with:
          operation: 'refresh'  # 'add' for first time, 'refresh' for updates
          library-name: 'drizzle-solid'
          library-url: 'https://github.com/Drizzle-Solid/drizzle-solid'
          docs-path: 'docs/'
          examples-path: 'examples/'
        env:
          CONTEXT7_API_KEY: ${{ secrets.CONTEXT7_API_KEY }}
