name: Issue Assistant

on:
  issues:
    types: [opened, labeled]
  issue_comment:
    types: [created]

jobs:
  respond:
    runs-on: ubuntu-latest
    # Only run on new issues or when labeled with 'needs-triage' or 'bug'
    if: |
      (github.event_name == 'issues' && github.event.action == 'opened') ||
      (github.event_name == 'issues' && contains(github.event.label.name, 'bug')) ||
      (github.event_name == 'issues' && contains(github.event.label.name, 'needs-triage'))

    steps:
      - uses: actions/checkout@v4

      - name: Analyze issue with Claude
        id: analyze
        run: |
          ISSUE_BODY=$(cat <<'EOF'
          ${{ github.event.issue.body }}
          EOF
          )

          ISSUE_TITLE="${{ github.event.issue.title }}"

          # Call Claude API to analyze the issue
          RESPONSE=$(curl -s https://api.anthropic.com/v1/messages \
            -H "content-type: application/json" \
            -H "x-api-key: ${{ secrets.ANTHROPIC_API_KEY }}" \
            -H "anthropic-version: 2023-06-01" \
            -d '{
              "model": "claude-sonnet-4-6",
              "max_tokens": 2048,
              "messages": [{
                "role": "user",
                "content": "Analyze this GitHub issue and provide:\n1. Issue category (bug/feature/question/documentation)\n2. Severity (critical/high/medium/low)\n3. Suggested response or next steps\n4. Whether it can be auto-fixed\n\nTitle: '"$ISSUE_TITLE"'\n\nBody:\n'"$ISSUE_BODY"'"
              }]
            }')

          echo "response=$RESPONSE" >> $GITHUB_OUTPUT

      - name: Comment on issue
        uses: actions/github-script@v7
        with:
          script: |
            const response = ${{ steps.analyze.outputs.response }};
            const content = JSON.parse(response).content[0].text;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `🤖 **Automated Analysis**\n\n${content}\n\n---\n*Powered by Claude Sonnet 4.6*`
            });

      - name: Auto-label issue
        uses: actions/github-script@v7
        with:
          script: |
            const response = ${{ steps.analyze.outputs.response }};
            const content = JSON.parse(response).content[0].text.toLowerCase();

            const labels = [];
            if (content.includes('bug')) labels.push('bug');
            if (content.includes('feature')) labels.push('enhancement');
            if (content.includes('documentation')) labels.push('documentation');
            if (content.includes('critical') || content.includes('high')) labels.push('priority-high');

            if (labels.length > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                labels: labels
              });
            }
