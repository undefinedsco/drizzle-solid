name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  unit-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18, 20, 22]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile --ignore-engines

      - name: Lint
        run: yarn lint
        continue-on-error: true

      - name: Build
        run: yarn build

      - name: Run unit tests
        run: npx vitest --run tests/unit/
        env:
          SOLID_OIDC_ISSUER: http://localhost:3000

      - name: Upload coverage
        if: matrix.node-version == 20
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  integration-test:
    runs-on: ubuntu-latest
    # Only run on Node 22 (required by xpod)
    needs: unit-test

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile --ignore-engines

      - name: Build
        run: yarn build

      - name: Install xpod
        run: npm install -g xpod --legacy-peer-deps

      - name: Start xpod on port 4000
        run: xpod start --port 4000 &
        env:
          CSS_BASE_URL: http://localhost:4000/

      - name: Wait for xpod to be ready
        run: |
          echo "Waiting for xpod..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:4000/.account/ > /dev/null 2>&1; then
              echo "xpod is ready!"
              break
            fi
            echo "Attempt $i/30..."
            sleep 2
          done

      - name: Generate test credentials
        id: creds
        run: |
          # Create test account and credentials via xpod CLI
          cd $(npm root -g)/xpod

          # Use xpod auth command to create credentials
          CREDS=$(node dist/cli/index.js auth create-credentials \
            --url http://localhost:4000 \
            --email test@example.com \
            --password test123456 \
            --output 2>&1 || echo "FAILED")

          echo "$CREDS"

          if echo "$CREDS" | grep -q "FAILED"; then
            echo "Failed to create credentials"
            exit 1
          fi

          CLIENT_ID=$(echo "$CREDS" | grep "client_id:" | awk '{print $2}')
          CLIENT_SECRET=$(echo "$CREDS" | grep "client_secret:" | awk '{print $2}')
          WEBID=$(echo "$CREDS" | grep "webId:" | awk '{print $2}')

          echo "client_id=$CLIENT_ID" >> $GITHUB_OUTPUT
          echo "client_secret=$CLIENT_SECRET" >> $GITHUB_OUTPUT
          echo "webid=$WEBID" >> $GITHUB_OUTPUT

      - name: Run integration tests
        run: npx vitest --run tests/integration/
        env:
          SOLID_OIDC_ISSUER: http://localhost:4000/
          SOLID_CLIENT_ID: ${{ steps.creds.outputs.client_id }}
          SOLID_CLIENT_SECRET: ${{ steps.creds.outputs.client_secret }}
          SOLID_WEBID: ${{ steps.creds.outputs.webid }}
          SOLID_TEST_POD_BASE: http://localhost:4000/test/
          SOLID_ENABLE_REAL_TESTS: true
